<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Password Reset</title>
    <link rel="stylesheet" href="../request/request-password-reset.css"> 
</head>
<body>
    <div class="reset-password-container">
            <h2>Request Password Reset</h2>
            <form id="requestPasswordResetForm">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required autocomplete="email" placeholder="your email here">

                <button type="submit">Send Reset Link</button>
            </form>
            <div id="toast" class="toast">
                    <span id="toastMessage"></span>
            </div>
    </div>
    <script src="../request/request-password-reset.js"></script>
</body>
</html>
