<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="../change_password/change.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <a href="index.html"><img src="logo.png" alt="Logo"></a>
            </div>
            <ul class="nav-links">
                <li><a href="../index.html"><span class="material-symbols-outlined">home</span>Home</a></li>
                <li><a href="../reset/reset-password.html"><span class="material-symbols-outlined">vpn_key</span>Reset Password</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="change-password-form">
            <h2><span class="material-symbols-outlined">lock_reset</span> Change Password</h2>
            <form id="changePasswordForm">
                <div class="form-group">
                    <label for="currentPassword"><span class="material-symbols-outlined">lock</span> Current Password</label>
                    <input type="password" id="currentPassword" name="currentPassword" required>
                </div>
                <div class="form-group">
                    <label for="newPassword"><span class="material-symbols-outlined">lock</span> New Password</label>
                    <input type="password" id="newPassword" name="newPassword" required>
                </div>
                <div class="form-group">
                    <label for="confirmNewPassword"><span class="material-symbols-outlined">lock</span> Confirm New Password</label>
                    <input type="password" id="confirmNewPassword" name="confirmNewPassword" required>
                </div>
                <button type="submit" class="cta-button"><span class="material-symbols-outlined">check_circle</span> Change Password</button>
            </form>
            <p id="changePasswordMessage" class="message"></p>
        </div>
    </main>

    <script src="../change_password/change.js"></script>
</body>
</html>
