<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="../reset/reset.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <a href="index.html"><img src="../portimages/brand_logo.webp" alt="Logo"></a>
            </div>
            <ul class="nav-links">
                <li><a href="../index.html"><span class="material-symbols-outlined">home</span>Home</a></li>
                <li><a href="change-password.html"><span class="material-symbols-outlined">lock_reset</span>Change Password</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="reset-password-form">
            <h2><span class="material-symbols-outlined">vpn_key</span> Reset Password</h2>
            <form id="resetPasswordForm">
                <div class="form-group">
                    <label for="email"><span class="material-symbols-outlined">email</span> Email Address</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <button type="submit" class="cta-button"><span class="material-symbols-outlined">send</span> Send Reset Link</button>
            </form>
            <div id="toast" class="toast">
                <span id="toastMessage"></span>
            </div>
            <div id="errorMessage" style="display: none; color: red; margin-bottom: 20px;"></div>
        </div>
    </main>
    <script src="../reset/reset-password.html"></script>
</body>
</html>
